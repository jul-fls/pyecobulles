name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements_dev.txt
      - name: Run pytest
        run: pytest -q --cov --cov-report=term-missing --cov-report=json:coverage.json
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.json
          slug: jul-fls/pyecobulles
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  typing:
    name: Strict typing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements_dev.txt
      - name: Run mypy
        run: mypy pyecobulles

  build:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_dev.txt
      - name: Install build tools
        run: python -m pip install build
      - name: Build package
        run: python -m build

